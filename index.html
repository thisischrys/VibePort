<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: media: https:; connect-src 'self' https://www.steamgriddb.com">
    <title>VibePort</title>
    <script>
      if (window.location.hash === '#shortcuts') {
        document.documentElement.style.setProperty('background', 'transparent', 'important');
        document.documentElement.style.setProperty('background-color', 'transparent', 'important');
        const style = document.createElement('style');
        style.innerHTML = 'html, body, #root { background: transparent !important; background-color: transparent !important; }';
        document.head.appendChild(style);
      }
    </script>
    <style>
      /* Inter font-face definitions */
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 300;
        font-display: swap;
        src: url('/fonts/inter-latin-300-normal.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/inter-latin-400-normal.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url('/fonts/inter-latin-500-normal.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url('/fonts/inter-latin-600-normal.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('/fonts/inter-latin-700-normal.woff2') format('woff2');
      }

      /* Outfit font-face definitions */
      @font-face {
        font-family: 'Outfit';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/outfit-latin-400-normal.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Outfit';
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url('/fonts/outfit-latin-500-normal.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Outfit';
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url('/fonts/outfit-latin-600-normal.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Outfit';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('/fonts/outfit-latin-700-normal.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Outfit';
        font-style: normal;
        font-weight: 800;
        font-display: swap;
        src: url('/fonts/outfit-latin-800-normal.woff2') format('woff2');
      }

      * {
        user-select: none;
        -webkit-user-select: none;
      }
      input, textarea, [contenteditable="true"] {
        user-select: text !important;
        -webkit-user-select: text !important;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: #0c0b14;
        color: #f1f5f9;
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
      }
      /* Custom Premium Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0c0b14;
      }
      ::-webkit-scrollbar-thumb {
        background: #222035;
        border-radius: 99px;
        border: 2px solid #0c0b14;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3e3b5e;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
